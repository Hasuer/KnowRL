name: knowrl
channels:
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
      # Extra index for PyTorch and packages not on default mirror
      - --extra-index-url https://download.pytorch.org/whl/cu124
      - --extra-index-url https://pypi.org/simple/

      # ===== PyTorch =====
      - torch==2.6.0
      - torchvision==0.21.0
      - torchaudio==2.6.0
      - triton==3.2.0

      # ===== Transformers & NLP =====
      - transformers==4.51.1
      - tokenizers==0.21.1
      - datasets==3.6.0
      - accelerate==1.10.1
      - peft==0.15.2
      - sentencepiece==0.2.0
      - sentence-transformers==4.1.0
      - safetensors==0.5.3
      - tiktoken==0.12.0
      - huggingface-hub==0.32.4

      # ===== Inference Engines =====
      # Note: vllm needs CUDA 12.1; flash-attn needs compilation
      - vllm==0.8.5.post1
      - sglang==0.4.6.post1
      - sgl-kernel==0.1.0
      - xformers==0.0.29.post2
      - flash-attn==2.7.4.post1

      # ===== Distributed Training =====
      - ray==2.46.0
      - tensordict==0.10.0
      - torchdata==0.11.0
      - cloudpickle==3.1.1

      # ===== Config & Logging =====
      - hydra-core==1.3.2
      - omegaconf==2.3.0
      - wandb==0.24.0
      - tensorboard==2.20.0

      # ===== Math Evaluation =====
      - math-verify==0.7.0
      - mathruler==0.1.0
      - latex2sympy2-extended==1.10.1
      - pylatexenc==2.10
      - sympy==1.13.1

      # ===== Data & Scientific =====
      - numpy==1.26.4
      - pandas==2.2.3
      - scipy==1.15.3
      - scikit-learn==1.7.0
      - matplotlib==3.10.3
      - openpyxl==3.1.5
      - pyarrow==20.0.0

      # ===== API & Serving =====
      - fastapi==0.115.12
      - uvicorn==0.34.3
      - openai==1.84.0
      - litellm==1.72.1

      # ===== Multimodal =====
      - pillow==11.2.1
      - opencv-python-headless==4.11.0.86
      - qwen-vl-utils==0.0.11
      - decord==0.6.0
      # av==14.4.0  # requires ffmpeg system libs: apt-get install libavformat-dev libavcodec-dev libavdevice-dev libavutil-dev libavfilter-dev libswscale-dev libswresample-dev pkg-config
      - einops==0.8.1

      # ===== Utilities =====
      - tqdm==4.67.1
      - pyyaml==6.0.2
      - rich==14.0.0
      - loguru==0.7.3
      - pydantic==2.11.5
      - requests==2.32.5
      - filelock==3.18.0
      - packaging==25.0
      - regex==2024.11.6
      - jinja2==3.1.6
      - dill==0.3.8
      - psutil==7.0.0
